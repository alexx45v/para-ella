<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti 💖</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #1a001f, #000);
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
        color: white;
    }

    .container {
        text-align: center;
        animation: aparecer 2s ease;
    }

    h1 {
        font-size: 2.5em;
        color: #ff4da6;
        text-shadow: 0 0 20px #ff4da6;
    }

    p {
        font-size: 1.2em;
        margin-top: 20px;
        max-width: 400px;
    }

    .btn {
        margin-top: 30px;
        padding: 10px 20px;
        border: none;
        background: #ff4da6;
        color: white;
        font-size: 1em;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #ff1a8c;
        transform: scale(1.1);
    }

    @keyframes aparecer {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .corazon {
        position: absolute;
        color: #ff4da6;
        font-size: 20px;
        animation: flotar 5s linear infinite;
    }

    @keyframes flotar {
        0% {
            transform: translateY(100vh) scale(0.5);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1.2);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Te amoooo tanto 💖</h1>
    <p id="mensaje">
        Peloooo tantoooo… que ya no es normal lo que siento por ti 😳  
        Me tienes pensando en ti todo el tiempo… y sí, eres mía… pero de esa forma bonita 😏🔥
    </p>

    <button class="btn" onclick="cambiarMensaje()">Tócame 😏</button>
</div>

<script>
function cambiarMensaje() {
    document.getElementById("mensaje").innerHTML =
    "No te voy a soltar… porque lo que eres para mí no lo encuentro en nadie más 😌💖<br><br>Y sí… te quiero solo para mí 😏🔥";
}

// corazones flotando
function crearCorazon() {
    const corazon = document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML = "❤️";

    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(corazon);

    setTimeout(() => {
        corazon.remove();
    }, 5000);
}

setInterval(crearCorazon, 300);
</script>

</body>
</html>
