<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solo tú 💘</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #ff4e88, #1a0010);
    font-family: 'Segoe UI', sans-serif;
    overflow:hidden;
    color:white;
}

/* fondo animado */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size:40px 40px;
    animation: moveBg 20s linear infinite;
}
@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

.container{
    text-align:center;
    z-index:2;
}

/* texto */
h1{
    font-size:2.5em;
    min-height:80px;
}

/* botón */
button{
    margin-top:30px;
    padding:18px 40px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:#fff;
    color:#ff2e70;
    cursor:pointer;
    animation: latido 1.5s infinite;
    transition:0.3s;
}

button:hover{
    transform:scale(1.2);
}

@keyframes latido{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* pantalla final */
.final{
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:1.5s;
}

.show{
    opacity:1;
    pointer-events:all;
}

/* texto final animado */
.final-text{
    font-size:2.5em;
    text-align:center;
    max-width:80%;
    animation: aparecer 2s ease;
}

@keyframes aparecer{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

/* corazones */
.heart{
    position:absolute;
    color:#ff4e88;
    font-size:20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh) scale(1);
        opacity:1;
    }
    to{
        transform:translateY(-10vh) scale(1.5);
        opacity:0;
    }
}
</style>

</head>

<body>

<div class="container">
    <h1 id="texto"></h1>
    <button onclick="accion()">Piénsalo bien 😏</button>
</div>

<div class="final" id="final">
    <div class="final-text" id="mensajeFinal"></div>
</div>

<script>
let paso = 0;
let texto = document.getElementById("texto");

// efecto máquina de escribir
function escribir(frase){
    texto.innerHTML = "";
    let i = 0;
    let intervalo = setInterval(()=>{
        texto.innerHTML += frase[i];
        i++;
        if(i >= frase.length) clearInterval(intervalo);
    },40);
}

// frases
const frases = [
    "Haz clic… si te atreves 😏",
    "¿segura…? 😌",
    "piénsalo bien… mírame antes 💭",
    "no es cualquier decisión… 💘"
];

// inicial
escribir(frases[0]);

function accion(){
    paso++;

    if(paso < frases.length){
        escribir(frases[paso]);
    }

    if(paso === frases.length){
        setTimeout(()=>{
            document.getElementById("final").classList.add("show");
            document.getElementById("mensajeFinal").innerHTML =
            "ya no hay duda…<br><br>eres mía 💘<br><br>y no pienso soltarte 😌";

            corazones();
        },800);
    }
}

// generar corazones
function corazones(){
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.fontSize = (15 + Math.random()*30) + "px";
        document.body.appendChild(heart);

        setTimeout(()=>{ heart.remove(); },5000);
    },200);
}
</script>

</body>
</html>
